name: Validate Repo

on:
  pull_request:
  push:
    branches:
      - master
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    name: Validate plugin and config
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate JSON and YAML
        run: |
          ruby <<'RUBY'
          require "json"
          require "yaml"

          files = `git ls-files`.lines.map(&:chomp)
          failed = false

          files.grep(/\.(json)$/).each do |path|
            begin
              JSON.parse(File.read(path))
              puts "json ok: #{path}"
            rescue => e
              warn "json invalid: #{path}: #{e.message}"
              failed = true
            end
          end

          files.grep(/\.(ya?ml)$/).each do |path|
            begin
              YAML.safe_load_file(path, permitted_classes: [Symbol], aliases: true)
              puts "yaml ok: #{path}"
            rescue => e
              warn "yaml invalid: #{path}: #{e.message}"
              failed = true
            end
          end

          exit(failed ? 1 : 0)
          RUBY

      - name: Forbid vendored portable skills and personal tooling
        run: |
          failed=0
          # Match .gitignore / docs: ban the entire .agents tree, not only skills/
          if [ -e .agents ] || [ -n "$(git ls-files '.agents' '.agents/**' 2>/dev/null)" ]; then
            echo "::error::Do not vendor portable agent tooling under .agents/; use a user-level skills plugin"
            find .agents -maxdepth 3 2>/dev/null || true
            git ls-files '.agents' '.agents/**' 2>/dev/null || true
            failed=1
          fi
          if [ -e .claude/skills ]; then
            echo "::error::Do not ship .claude/skills in this public plugin repo"
            ls -la .claude/skills
            failed=1
          fi
          if [ -e .mcp.json ]; then
            echo "::error::Do not commit .mcp.json (personal MCP wiring)"
            failed=1
          fi
          if [ -d .codex ] || [ -e .codex ]; then
            echo "::error::Do not commit .codex/ (personal Codex config)"
            find .codex -maxdepth 2 2>/dev/null || true
            failed=1
          fi
          if [ -d .claude/commands ]; then
            echo "::error::.claude/commands should not be reintroduced; plugin commands live under plugins/*/commands/"
            find .claude/commands -maxdepth 2 -type f
            failed=1
          fi
          exit "$failed"

      - name: Validate plugin skills
        run: |
          ruby <<'RUBY'
          require "yaml"

          skill_dirs = Dir.glob("plugins/*/skills/*").select { |path| File.directory?(path) }.sort
          abort "no plugin skills found under plugins/*/skills/" if skill_dirs.empty?

          failed = false

          skill_dirs.each do |dir|
            skill_file = File.join(dir, "SKILL.md")
            unless File.file?(skill_file)
              warn "missing SKILL.md: #{dir}"
              failed = true
              next
            end

            text = File.read(skill_file)
            match = text.match(/\A---\s*\n(.*?)\n---\s*\n/m)
            unless match
              warn "missing YAML frontmatter: #{skill_file}"
              failed = true
              next
            end

            begin
              data = YAML.safe_load(match[1]) || {}
            rescue => e
              warn "invalid frontmatter: #{skill_file}: #{e.message}"
              failed = true
              next
            end

            expected_name = File.basename(dir)
            name = data["name"]
            description = data["description"].to_s

            if name != expected_name
              warn "skill name mismatch: #{skill_file}: expected #{expected_name.inspect}, got #{name.inspect}"
              failed = true
            end

            unless name.to_s.match?(/\A[a-z0-9]+(?:-[a-z0-9]+)*\z/) && name.length <= 64
              warn "invalid skill name: #{skill_file}: #{name.inspect}"
              failed = true
            end

            if description.empty? || description.length > 1024
              warn "invalid description length: #{skill_file}: #{description.length}"
              failed = true
            end

            # Ignore fenced examples so skill docs can mention example paths.
            searchable = text.gsub(/```.*?```/m, "")
            searchable.scan(/`((?:references|scripts|assets)\/[^`\s]+)`/) do |match_path|
              relative_path = match_path.first
              full_path = File.join(dir, relative_path)
              next if File.exist?(full_path)

              warn "missing referenced skill file: #{skill_file}: #{relative_path}"
              failed = true
            end

            # Optional Codex metadata: only enforce when present.
            openai_file = File.join(dir, "agents", "openai.yaml")
            if File.file?(openai_file)
              begin
                openai = YAML.safe_load_file(openai_file) || {}
                default_prompt = openai.dig("interface", "default_prompt").to_s
                unless default_prompt.include?("$#{expected_name}")
                  warn "openai default_prompt should mention $#{expected_name}: #{openai_file}"
                  failed = true
                end
              rescue => e
                warn "invalid openai metadata: #{openai_file}: #{e.message}"
                failed = true
              end
            end

            puts "skill ok: #{dir}"
          end

          exit(failed ? 1 : 0)
          RUBY

      - name: Validate plugin commands and agents
        run: |
          ruby <<'RUBY'
          require "yaml"

          def frontmatter(path)
            text = File.read(path)
            match = text.match(/\A---\s*\n(.*?)\n---\s*\n/m)
            return nil unless match
            YAML.safe_load(match[1]) || {}
          end

          failed = false

          Dir.glob("plugins/*/commands/*.md").sort.each do |path|
            data = frontmatter(path)
            if data.nil?
              warn "missing YAML frontmatter: #{path}"
              failed = true
              next
            end
            if data["description"].to_s.strip.empty?
              warn "missing description: #{path}"
              failed = true
            end
            puts "command ok: #{path}"
          end

          Dir.glob("plugins/*/agents/*.md").sort.each do |path|
            data = frontmatter(path)
            if data.nil?
              warn "missing YAML frontmatter: #{path}"
              failed = true
              next
            end
            %w[name description tools].each do |field|
              if data[field].to_s.strip.empty?
                warn "missing #{field}: #{path}"
                failed = true
              end
            end
            puts "agent ok: #{path}"
          end

          exit(failed ? 1 : 0)
          RUBY

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
